<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title><strong>Feedback Survey</strong></title>
    </head>
    <body>
        <h1>Customer Feedback Survey</h1>
        <em>Your opinion matters to us! Please share your experience.</em>
        <br><br>
        <fieldset> 
            <legend>Customer Information</legend>
            <p>
                <label for="name">Full Name *</label>
                <br>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </p> 
            <p>
                <label for="email">Email Address *</label>
                <br>
                <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
            </p>
            <p>
                <label for="phone">Phone Number</label>
                <br>
                <input type="text" id="phone" name="phone" placeholder="+1 (555) 123-4567">
            </p>
            <p>
                <label for="customer-id">Customer ID</label>
                <br>
                <input type="text" id="customer-id" name="customer-id" placeholder="Enter your customer ID">
            </p>
        </fieldset>
        <fieldset>
            <legend>Service Evaluation</legend>
            <label for="service rate">Overall Service Rate (1-5)</label>
            <br>
            <input type="radio" id="poor" name="service rate" value="1">
            <label for="poor">1 - Poor</label>
            <br>
            <input type="radio" id="fair" name="service rate" value="2">
            <label for="fair">2 - Fair</label>
            <br>
            <input type="radio" id="good" name="service rate" value="3">
            <label for="good">3 - Good</label>
            <br>
            <input type="radio" id="very good" name="service rate" value="4">
            <label for="very good">4 - Very Good</label>
            <br>
            <input type="radio" id="excellent" name="service rate" value="5">
            <label for="excellent">5 - Excellent</label>
            </p>
                <label for="service category">Service Category*</label>
                <br>
                <select id="service category" name="Select service category" required>
                    <option value="">Select service category</option>
                    <option value="Technical Support">Technical Support</option>
                    <option value="Sales">Sales</option>
                    <option value="Billing">Billing</option>
                    <option value="General Inquiry">General Inquiry</option>
                </select>
            </p>
            <label for="recommend">Would you recommend us?</label>
            <br>
            <input type="radio" id="yes" name="recommend" value="Yes, definitely">
            <label for="yes">Yes, definitely</label>
            <br>
            <input type="radio" id="maybe" name="recommend" value="Maybe">
            <label for="maybe">Maybe</label>
            <br>
            <input type="radio" id="no" name="recommend" value="No, I would not">
            <label for="no">No, I would not</label>
        </fieldset>
        <fieldset>
            <legend>Experience Details</legend>
            <label for="date">Visit Date</label>
            <br>
            <input type="date" id="date" name="date">
            <legend>How did you hear about us?</legend>
            <input type="checkbox" id="social media" name="source" value="Social Media">
            <label for="social media">Social Media</label>
            <br>
            <input type="checkbox" id="friend" name="source" value="Friend/Family Recommendation">
            <label for="friend">Friend/Family Recommendation</label>
            <br>
            <input type="checkbox" id="advertisement" name="source" value="Advertisement">
            <label for="advertisement">Advertisement</label>
            <br>
            <input type="checkbox" id="search engine" name="source" value="Search Engine">
            <label for="search engine">Search Engine</label>
            <br>
            <input type="checkbox" id="other" name="source" value="Other">
            <label for="other">Other</label>
            <p>
                <label for="comments">Additional Comments*</label>
                <br>
                <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Please share your detailed feedback here..." required></textarea>
            </p>
        </fieldset>
        <fieldset>
            <legend>Contact Preferences</legend>
            <label for="method">Preferred Contact Method</label>
            <br>
            <input type="radio" id="email" name="method" value="Email">
            <label for="email">Email</label>
            <br>
            <input type="radio" id="phone" name="method" value="Phone">
            <label for="phone">Phone</label>
            <br>
            <input type="radio" id="sms" name="method" value="SMS">
            <label for="sms">SMS</label>
            <br>           
            <input type="radio" id="postal mail" name="method" value="Postal Mail">
            <label for="postal mail">Postal Mail</label>
            <br>
            <input type="radio" id="do not contact me" name="method" value="Do Not Contact Me">
            <label for="do not contact me">Do not contact me</label>
            <br>
            </p>
                <label for="best time">Best Time to Contact</label>
                <br>
                <select id="service preferred time" name="Select preferred time">
                    <option value="">Select preferred time</option>                
                    <option value="morning">Morning</option>
                    <option value="afternoon">Afternoon</option>
                    <option value="evening">Evening</option>
                </select>
            </p>
        </fieldset>
            <br> 
            <input type="checkbox" id="confirm" name="source" value="confirm" required>
            <label for="confirm">I confirm that all information provided is accurate*</label>
            <br><br>
            <input type="submit" value="Submit Feedback"> 
            <input type="reset" value="Clear All Fields">  
            <br> 
    </body>
</html>
